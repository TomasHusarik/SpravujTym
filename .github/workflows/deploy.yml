name: Build and Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: "**/package-lock.json"

            - name: Install dependencies
              run: |
                npm ci --prefix client
                npm ci --prefix server

            - name: Build
              run: npm run build

            - name: Prepare deployment
              run: |
                  mkdir -p deploy/server deploy/client

                  cp server/package.json deploy/package.json
                  cp server/package-lock.json deploy/package-lock.json

                  cp -r server/dist deploy/dist
                  cp -r client/dist deploy/client

                  cp -r server/assets deploy/server/assets || true
                  
            - name: Install production dependencies
              run:
                  npm ci --omit=dev --prefix deploy/server

            - name: Deploy to Azure
              uses: azure/webapps-deploy@v3
              with:
                  app-name: "SpravujTym"
                  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
                  package: "./deploy"
